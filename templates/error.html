{% extends "base.html" %}

{% block title %}出错了 - PVZH 工坊{% endblock %}

{% block content %}
<div class="flex justify-center items-center h-[60vh]">
    <div class="bg-white p-8 rounded-3xl shadow-sm text-center max-w-md w-full border border-red-100">
        <span class="material-symbols-rounded text-red-500 text-6xl mb-4">error</span>
        <h2 class="text-xl font-bold text-gray-800 mb-2">操作失败</h2>
        <p class="text-gray-600 mb-8">{{ msg }}</p>
        <button onclick="window.history.back()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-2 px-6 rounded-xl transition inline-flex items-center">
            <span class="material-symbols-rounded mr-2 text-[20px]">arrow_back</span>
            返回重试
        </button>
    </div>
</div>
{% endblock %}
